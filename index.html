<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NSE/BSE Stock Analyzer Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#050A0F; --surface:#0A1520; --card:#0F1E2E; --border:#1A3050;
    --accent:#00D4FF; --accent2:#00FF88; --buy:#00FF88; --sell:#FF4560;
    --hold:#FFB800; --text:#E0F0FF; --muted:#4A6A8A;
    --glow:0 0 20px rgba(0,212,255,0.3);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;font-size:15px;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 20%,rgba(0,212,255,.04),transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(0,255,136,.03),transparent 50%);pointer-events:none;z-index:0;}

  header{position:sticky;top:0;z-index:100;background:rgba(5,10,15,.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;gap:12px;height:56px;}
  .logo{font-family:'Space Mono';font-size:16px;color:var(--accent);letter-spacing:2px;white-space:nowrap;}
  .logo span{color:var(--accent2);}
  .market-ticker{flex:1;overflow:hidden;display:flex;gap:20px;align-items:center;mask-image:linear-gradient(90deg,transparent,black 5%,black 95%,transparent);}
  .tick-item{display:flex;gap:6px;align-items:center;white-space:nowrap;font-family:'JetBrains Mono';font-size:11px;}
  .tick-name{color:var(--muted);}
  .tick-val{color:var(--text);font-weight:600;}
  .tick-chg.up{color:var(--buy);}
  .tick-chg.dn{color:var(--sell);}
  .time-badge{font-family:'JetBrains Mono';font-size:11px;color:var(--muted);background:var(--surface);padding:5px 10px;border-radius:6px;border:1px solid var(--border);white-space:nowrap;}

  /* SEARCH */
  .search-wrap{padding:12px 16px 0;position:relative;z-index:50;}
  .search-box{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:10px 16px 10px 40px;border-radius:10px;font-family:'Rajdhani';font-size:15px;outline:none;transition:border .2s;}
  .search-box:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(0,212,255,.1);}
  .search-icon{position:absolute;left:28px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:16px;pointer-events:none;}
  .search-results{position:absolute;top:calc(100% + 4px);left:16px;right:16px;background:var(--card);border:1px solid var(--accent);border-radius:10px;max-height:320px;overflow-y:auto;z-index:999;display:none;box-shadow:0 8px 32px rgba(0,0,0,.8);}
  .search-results.open{display:block;}
  .search-result-item{padding:12px 16px;cursor:pointer;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;transition:background .15s;}
  .search-result-item:last-child{border-bottom:none;}
  .search-result-item:hover,.search-result-item.highlighted{background:var(--surface);}
  .sr-left .sr-sym{font-weight:700;font-size:15px;}
  .sr-left .sr-name{font-size:12px;color:var(--muted);}
  .sr-right{text-align:right;}
  .sr-price{font-family:'JetBrains Mono';font-size:13px;}
  .sr-sig{font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px;font-family:'Space Mono';}
  .sr-buy{background:rgba(0,255,136,.15);color:#00FF88;}
  .sr-sell{background:rgba(255,69,96,.15);color:#FF4560;}
  .sr-hold{background:rgba(255,184,0,.15);color:#FFB800;}
  .search-no-result{padding:20px;text-align:center;color:var(--muted);font-size:13px;}

  /* INDEX CARDS */
  .indices-section{padding:12px 16px 0;position:relative;z-index:1;}
  .indices-title{font-size:12px;color:var(--muted);letter-spacing:1px;font-weight:600;margin-bottom:8px;}
  .indices-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
  .index-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;position:relative;overflow:hidden;cursor:pointer;transition:all .2s;}
  .index-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
  .index-card.idx-buy::before{background:var(--buy);}
  .index-card.idx-sell::before{background:var(--sell);}
  .index-card.idx-hold::before{background:var(--hold);}
  .index-card:hover{border-color:var(--accent);box-shadow:var(--glow);}
  .idx-name{font-size:10px;color:var(--muted);font-weight:600;letter-spacing:.5px;margin-bottom:4px;}
  .idx-value{font-family:'JetBrains Mono';font-size:15px;font-weight:700;margin-bottom:2px;}
  .idx-chg{font-family:'JetBrains Mono';font-size:11px;}
  .idx-chg.up{color:var(--buy);}
  .idx-chg.dn{color:var(--sell);}
  .idx-verdict{margin-top:8px;padding:4px 0;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
  .idx-verdict-label{font-size:10px;color:var(--muted);}
  .idx-verdict-sig{font-size:11px;font-weight:700;font-family:'Space Mono';}
  .idx-verdict-sig.buy{color:var(--buy);}
  .idx-verdict-sig.sell{color:var(--sell);}
  .idx-verdict-sig.hold{color:var(--hold);}
  .idx-invest-badge{display:inline-block;margin-top:6px;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;font-family:'Space Mono';letter-spacing:1px;}
  .invest-yes{background:rgba(0,255,136,.2);color:#00FF88;border:1px solid rgba(0,255,136,.4);}
  .invest-no{background:rgba(255,69,96,.2);color:#FF4560;border:1px solid rgba(255,69,96,.4);}
  .invest-wait{background:rgba(255,184,0,.2);color:#FFB800;border:1px solid rgba(255,184,0,.4);}

  /* TABS */
  .tab-nav{display:flex;gap:4px;padding:12px 16px 0;position:relative;z-index:1;}
  .tab-btn{padding:9px 16px;border:1px solid var(--border);background:var(--surface);color:var(--muted);border-radius:8px 8px 0 0;cursor:pointer;font-family:'Rajdhani';font-size:14px;font-weight:600;letter-spacing:1px;transition:all .2s;border-bottom:none;}
  .tab-btn.active{background:var(--card);color:var(--accent);border-color:var(--accent);box-shadow:0 -2px 12px rgba(0,212,255,.2);}

  /* DASHBOARD */
  .dashboard{display:none;padding:0 16px 24px;position:relative;z-index:1;}
  .dashboard.active{display:block;}
  .dash-header{background:var(--card);border:1px solid var(--border);border-top:2px solid var(--accent);border-radius:0 8px 8px 8px;padding:14px 16px;margin-bottom:16px;}
  .dash-title{font-size:18px;font-weight:700;color:var(--accent);letter-spacing:2px;margin-bottom:4px;}
  .dash-meta{font-size:12px;color:var(--muted);margin-bottom:12px;}
  .controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}

  /* SECTOR FILTER - FIXED */
  .sector-filter-wrap{position:relative;display:inline-block;}
  .sector-btn{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:7px 14px;border-radius:8px;font-family:'Rajdhani';font-size:14px;cursor:pointer;transition:border .2s;display:flex;align-items:center;gap:6px;}
  .sector-btn.active-filter{border-color:var(--accent);color:var(--accent);}
  .sector-dropdown{position:absolute;top:calc(100% + 4px);left:0;background:var(--card);border:1px solid var(--accent);border-radius:10px;min-width:180px;z-index:200;display:none;box-shadow:0 8px 32px rgba(0,0,0,.8);overflow:hidden;}
  .sector-dropdown.open{display:block;}
  .sector-option{padding:10px 16px;cursor:pointer;font-size:14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;transition:background .15s;}
  .sector-option:last-child{border-bottom:none;}
  .sector-option:hover{background:var(--surface);}
  .sector-option.selected{color:var(--accent);}
  .sector-check{color:var(--accent);font-size:12px;}

  .ctrl-btn{padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-family:'Rajdhani';font-weight:700;font-size:13px;transition:all .2s;letter-spacing:1px;}
  .ctrl-btn.primary{background:var(--accent);color:#000;}
  .ctrl-btn.primary:hover{background:#00b8d9;}
  .ctrl-btn.secondary{background:var(--surface);color:var(--text);border:1px solid var(--border);}
  .ctrl-btn.secondary.active-filter{border-color:var(--accent);color:var(--accent);}

  /* SUMMARY */
  .summary-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;}
  .sum-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;}
  .sum-label{font-size:11px;color:var(--muted);letter-spacing:.5px;margin-bottom:4px;}
  .sum-val{font-family:'JetBrains Mono';font-size:20px;font-weight:700;}
  .sum-val.green{color:var(--buy);}
  .sum-val.red{color:var(--sell);}
  .sum-val.yellow{color:var(--hold);}
  .sum-val.blue{color:var(--accent);}

  /* STOCK GRID */
  .stock-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;margin-bottom:20px;}
  .stock-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;position:relative;overflow:hidden;cursor:pointer;transition:all .25s;}
  .stock-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
  .stock-card.sig-buy::before{background:var(--buy);}
  .stock-card.sig-sell::before{background:var(--sell);}
  .stock-card.sig-hold::before{background:var(--hold);}
  .stock-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--glow);}
  .card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
  .stock-name{font-size:17px;font-weight:700;}
  .stock-sector{font-size:11px;color:var(--muted);margin-top:2px;}
  .signal-badge{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;letter-spacing:1px;font-family:'Space Mono';}
  .sig-buy .signal-badge{background:rgba(0,255,136,.15);color:var(--buy);border:1px solid rgba(0,255,136,.3);}
  .sig-sell .signal-badge{background:rgba(255,69,96,.15);color:var(--sell);border:1px solid rgba(255,69,96,.3);}
  .sig-hold .signal-badge{background:rgba(255,184,0,.15);color:var(--hold);border:1px solid rgba(255,184,0,.3);}
  .price-row{display:flex;align-items:baseline;gap:10px;margin-bottom:8px;}
  .price-main{font-family:'JetBrains Mono';font-size:22px;font-weight:600;}
  .price-chg{font-family:'JetBrains Mono';font-size:13px;}
  .price-chg.up{color:var(--buy);}
  .price-chg.dn{color:var(--sell);}
  .metrics-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin:8px 0;}
  .metric{background:var(--surface);border-radius:6px;padding:7px 8px;text-align:center;}
  .metric-label{font-size:10px;color:var(--muted);letter-spacing:.5px;margin-bottom:2px;}
  .metric-val{font-family:'JetBrains Mono';font-size:12px;font-weight:600;}
  .indicator-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px;}
  .ind-tag{font-size:10px;padding:2px 7px;border-radius:4px;font-family:'JetBrains Mono';font-weight:600;}
  .ind-bull{background:rgba(0,255,136,.1);color:#00FF88;border:1px solid rgba(0,255,136,.2);}
  .ind-bear{background:rgba(255,69,96,.1);color:#FF4560;border:1px solid rgba(255,69,96,.2);}
  .ind-neu{background:rgba(0,212,255,.1);color:#00D4FF;border:1px solid rgba(0,212,255,.2);}
  .sparkline{height:40px;margin-top:10px;}
  svg.spark{width:100%;height:40px;}
  .card-footer{display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:8px;border-top:1px solid var(--border);}
  .target-row{font-size:11px;color:var(--muted);}
  .target-row span{color:var(--accent2);font-weight:700;font-family:'JetBrains Mono';}
  .ai-analyze-btn{font-size:11px;padding:4px 12px;border-radius:6px;border:1px solid var(--accent);background:transparent;color:var(--accent);cursor:pointer;font-family:'Rajdhani';font-weight:600;transition:all .2s;}
  .ai-analyze-btn:hover{background:var(--accent);color:#000;}
  .no-results{text-align:center;padding:48px 24px;color:var(--muted);font-size:16px;grid-column:1/-1;}

  /* LIVE DOT */
  .live-dot{width:7px;height:7px;background:var(--buy);border-radius:50%;display:inline-block;animation:pulse 1.5s infinite;}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}

  /* COUNTDOWN */
  .countdown-wrap{display:flex;align-items:center;gap:6px;}
  .countdown-ring{display:block;transform:rotate(-90deg);}
  .ring-bg{fill:none;stroke:var(--border);stroke-width:3;}
  .ring-fg{fill:none;stroke:var(--accent);stroke-width:3;stroke-linecap:round;transition:stroke-dashoffset .9s linear,stroke .3s;}

  /* AI MODAL */
  .ai-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);backdrop-filter:blur(16px);z-index:998;align-items:center;justify-content:center;padding:16px;}
  .ai-modal-overlay.open{display:flex;}
  .ai-modal{background:var(--card);border:1px solid var(--border);border-radius:20px;width:100%;max-width:700px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 0 60px rgba(0,212,255,.15);}
  .ai-modal-header{padding:20px 22px 14px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:12px;background:linear-gradient(135deg,rgba(0,212,255,.05),transparent);}
  .ai-modal-stock-info{flex:1;}
  .ai-modal-sym{font-family:'Space Mono';font-size:20px;color:var(--accent);letter-spacing:2px;}
  .ai-modal-name{font-size:13px;color:var(--muted);margin-top:2px;}
  .ai-modal-price-block{text-align:right;}
  .ai-modal-price{font-family:'JetBrains Mono';font-size:24px;font-weight:700;}
  .ai-modal-chg{font-family:'JetBrains Mono';font-size:13px;margin-top:2px;}
  .ai-verdict-badge{display:inline-flex;align-items:center;gap:8px;padding:7px 18px;border-radius:30px;font-family:'Space Mono';font-size:14px;font-weight:700;letter-spacing:2px;margin-top:8px;}
  .verdict-buy{background:rgba(0,255,136,.15);color:#00FF88;border:1px solid rgba(0,255,136,.4);}
  .verdict-sell{background:rgba(255,69,96,.15);color:#FF4560;border:1px solid rgba(255,69,96,.4);}
  .verdict-hold{background:rgba(255,184,0,.15);color:#FFB800;border:1px solid rgba(255,184,0,.4);}
  .ai-modal-body{padding:20px 22px;overflow-y:auto;flex:1;}
  .ai-score-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:18px;}
  .ai-score-card{background:var(--surface);border-radius:10px;padding:10px;text-align:center;border:1px solid var(--border);}
  .ai-score-label{font-size:10px;color:var(--muted);letter-spacing:.5px;margin-bottom:5px;}
  .ai-score-val{font-family:'JetBrains Mono';font-size:20px;font-weight:700;}
  .ai-section{margin-bottom:18px;}
  .ai-section-title{font-size:12px;color:var(--accent);letter-spacing:1.5px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:8px;padding-bottom:6px;border-bottom:1px solid var(--border);}
  .ai-text{font-size:14px;line-height:1.7;color:var(--text);font-family:'Rajdhani';white-space:pre-wrap;}
  .ai-pros-cons{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .ai-pros,.ai-cons{background:var(--surface);border-radius:10px;padding:12px;border:1px solid var(--border);}
  .ai-pros{border-top:2px solid #00FF88;}
  .ai-cons{border-top:2px solid #FF4560;}
  .ai-pc-title{font-size:11px;font-weight:700;letter-spacing:1px;margin-bottom:8px;}
  .ai-pros .ai-pc-title{color:#00FF88;}
  .ai-cons .ai-pc-title{color:#FF4560;}
  .ai-pc-item{font-size:12px;color:var(--muted);margin-bottom:5px;display:flex;gap:6px;align-items:flex-start;line-height:1.5;}
  .ai-pc-dot{margin-top:5px;width:5px;height:5px;border-radius:50%;flex-shrink:0;}
  .ai-pros .ai-pc-dot{background:#00FF88;}
  .ai-cons .ai-pc-dot{background:#FF4560;}
  .ai-target-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:12px;}
  .ai-target-card{background:var(--surface);border-radius:10px;padding:10px;text-align:center;}
  .ai-target-label{font-size:10px;color:var(--muted);margin-bottom:4px;}
  .ai-target-val{font-family:'JetBrains Mono';font-size:17px;font-weight:700;}
  .ai-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:48px 24px;}
  .ai-loading-orb{width:56px;height:56px;border-radius:50%;border:3px solid var(--border);border-top-color:var(--accent);animation:spin 1s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .ai-loading-text{color:var(--muted);font-size:13px;letter-spacing:1px;font-family:'JetBrains Mono';}
  .close-modal{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;line-height:1;padding:4px 8px;}
  .close-modal:hover{color:var(--text);}

  ::-webkit-scrollbar{width:5px;height:5px;}
  ::-webkit-scrollbar-track{background:var(--surface);}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

  @media(max-width:600px){
    .summary-strip{grid-template-columns:repeat(2,1fr);}
    .ai-score-row{grid-template-columns:repeat(2,1fr);}
    .ai-pros-cons{grid-template-columns:1fr;}
    .market-ticker{display:none;}
    .indices-grid{grid-template-columns:repeat(3,1fr);}
  }
</style>
</head>
<body>

<header>
  <div class="logo">NSE/<span>BSE</span></div>
  <div class="market-ticker" id="ticker"></div>
  <div class="time-badge" id="timeBadge">--:--:--</div>
</header>

<!-- SEARCH -->
<div class="search-wrap">
  <span class="search-icon">🔍</span>
  <input class="search-box" id="searchBox" type="text" placeholder="Search any Indian stock — RELIANCE, TCS, INFY, HDFCBANK..." autocomplete="off">
  <div class="search-results" id="searchResults"></div>
</div>

<!-- INDEX CARDS -->
<div class="indices-section">
  <div class="indices-title">▸ MARKET INDICES — INVEST SIGNAL</div>
  <div class="indices-grid" id="indicesGrid"></div>
</div>

<!-- TABS -->
<div class="tab-nav">
  <button class="tab-btn active" onclick="switchTab('intraday',this)">INTRADAY</button>
  <button class="tab-btn" onclick="switchTab('swing',this)">SWING</button>
  <button class="tab-btn" onclick="switchTab('longterm',this)">LONG TERM</button>
</div>

<!-- INTRADAY -->
<div class="dashboard active" id="dash-intraday">
  <div class="dash-header">
    <div class="dash-title">⚡ INTRADAY SIGNALS</div>
    <div class="dash-meta"><span class="live-dot"></span> Live · NSE &amp; BSE · Auto-refresh every 15s</div>
    <div class="controls">
      <!-- FIXED SECTOR FILTER -->
      <div class="sector-filter-wrap">
        <button class="sector-btn" id="sectorBtn" onclick="toggleSectorDropdown()">
          <span id="sectorLabel">ALL SECTORS</span> ▾
        </button>
        <div class="sector-dropdown" id="sectorDropdown"></div>
      </div>
      <button class="ctrl-btn secondary" id="btnBuy" onclick="toggleSignalFilter('BUY')">🟢 BUY</button>
      <button class="ctrl-btn secondary" id="btnSell" onclick="toggleSignalFilter('SELL')">🔴 SELL</button>
      <button class="ctrl-btn primary" onclick="refreshAll();resetCountdown()">↻ REFRESH</button>
      <div class="countdown-wrap">
        <svg class="countdown-ring" width="26" height="26" viewBox="0 0 28 28">
          <circle class="ring-bg" cx="14" cy="14" r="12"/>
          <circle class="ring-fg" id="ringFg" cx="14" cy="14" r="12" style="stroke-dasharray:75.4;stroke-dashoffset:0;transform-origin:14px 14px"/>
        </svg>
        <span id="countdownNum" style="font-family:'JetBrains Mono';font-size:11px;color:var(--accent);min-width:20px">15s</span>
      </div>
    </div>
  </div>
  <div class="summary-strip">
    <div class="sum-card"><div class="sum-label">TOTAL</div><div class="sum-val blue" id="totalSig">0</div></div>
    <div class="sum-card"><div class="sum-label">BUY</div><div class="sum-val green" id="buySig">0</div></div>
    <div class="sum-card"><div class="sum-label">SELL</div><div class="sum-val red" id="sellSig">0</div></div>
    <div class="sum-card"><div class="sum-label">HOLD</div><div class="sum-val yellow" id="holdSig">0</div></div>
  </div>
  <div class="stock-grid" id="stockGrid"></div>
</div>

<!-- SWING -->
<div class="dashboard" id="dash-swing">
  <div class="dash-header">
    <div class="dash-title">📈 SWING TRADE PICKS</div>
    <div class="dash-meta">3–10 Day Momentum Trades</div>
  </div>
  <div class="stock-grid" id="swingGrid"></div>
</div>

<!-- LONG TERM -->
<div class="dashboard" id="dash-longterm">
  <div class="dash-header">
    <div class="dash-title">🏦 LONG TERM INVESTMENTS</div>
    <div class="dash-meta">6–24 Month Wealth Creation</div>
  </div>
  <div class="stock-grid" id="longtermGrid"></div>
</div>

function rnd(min,max){return +(Math.random()*(max-min)+min).toFixed(2);}
function rndInt(min,max){return Math.floor(Math.random()*(max-min+1)+min);}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}

function calcInvestAdvice(rsi, trend, pe){
  if(rsi < 40 && trend === 'up') return {label:'✅ INVEST NOW', cls:'invest-yes', detail:'Oversold + bullish momentum'};
  if(rsi > 70) return {label:'⛔ AVOID NOW', cls:'invest-no', detail:'Overbought – wait for dip'};
  if(rsi >= 50 && rsi <= 65 && trend === 'up') return {label:'✅ GOOD ENTRY', cls:'invest-yes', detail:'Healthy momentum'};
  if(rsi >= 40 && rsi <= 50) return {label:'⏳ WAIT & WATCH', cls:'invest-wait', detail:'Consolidating zone'};
  return {label:'⏳ HOLD OFF', cls:'invest-wait', detail:'Mixed signals'};
}

function generateIndexData(){
  const indices = [
    {name:"NIFTY 50",  base:22400, symbol:"^NSEI"},
    {name:"SENSEX",    base:73800, symbol:"^BSESN"},
    {name:"BANK NIFTY",base:47200, symbol:"^NSEBANK"},
  ];
  return indices.map(idx => {
    const chg = rnd(-1.5,1.5);
    const price = +(idx.base * (1 + chg/100)).toFixed(2);
    const rsi = rndInt(35,72);
    const trend = chg >= 0 ? 'up' : 'dn';
    const signals = ['BUY','SELL','HOLD'];
    let sig;
    if(rsi < 45) sig = 'SELL';
    else if(rsi > 60) sig = 'BUY';
    else sig = 'HOLD';
    const invest = calcInvestAdvice(rsi, chg>=0?'up':'dn', 22);
    return {name:idx.name, price, chg, rsi, sig, invest, trend};
  });
}

function generateStockData(count=30){
  const sigs = ['BUY','BUY','BUY','SELL','SELL','HOLD'];
  const shuffled = [...ALL_STOCKS].sort(()=>Math.random()-.5).slice(0,count);
  return shuffled.map(s=>{
    const price = rnd(50,5000);
    const chg = rnd(-4,4);
    const rsi = rndInt(25,80);
    const sig = rsi > 60 ? 'BUY' : rsi < 40 ? 'SELL' : 'HOLD';
    const pe = rnd(10,60);
    const mktCap = +(price * rnd(50,2000)).toFixed(0);
    const spark = Array.from({length:12},()=>rnd(price*0.95,price*1.05));
    const indicators = [];
    if(rsi > 55) indicators.push({label:'RSI+',type:'bull'});
    else if(rsi < 40) indicators.push({label:'RSI-',type:'bear'});
    if(chg > 0) indicators.push({label:'MACD↑',type:'bull'});
    else indicators.push({label:'MACD↓',type:'bear'});
    indicators.push({label:pick(['EMA20','EMA50','SMA200']),type:pick(['bull','bear','neu'])});
    indicators.push({label:pick(['VOL↑','VOL↓','BB+']),type:pick(['bull','bear','neu'])});
    const target = +(price * (1 + rnd(0.05,0.25))).toFixed(2);
    return {...s, price, chg, rsi, sig, pe, mktCap, spark, indicators, target};
  });
}

function sparkSVG(data, sig){
  const min=Math.min(...data), max=Math.max(...data), range=max-min||1;
  const w=280, h=40, pts=data.length;
  const coords=data.map((v,i)=>[i/(pts-1)*w, h-(v-min)/range*(h-6)-3]);
  const path='M'+coords.map(p=>p.join(',')).join('L');
  const col = sig==='BUY'?'#00FF88':sig==='SELL'?'#FF4560':'#FFB800';
  return `<svg class="spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <defs><linearGradient id="sg${Math.random().toString(36).slice(2,6)}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${col}" stop-opacity=".3"/>
      <stop offset="100%" stop-color="${col}" stop-opacity="0"/>
    </linearGradient></defs>
    <path d="${path}L${w},${h}L0,${h}Z" fill="${col}" opacity=".12"/>
    <path d="${path}" fill="none" stroke="${col}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
}

      <div class="idx-invest-badge ${idx.invest.cls}">${idx.invest.label}</div>
    </div>`;
  }).join('');
}

}

function renderStockGrid(){
  const grid = document.getElementById('stockGrid');
  let filtered = stockData;
  if(activeSectorFilter) filtered = filtered.filter(s=>s.sector===activeSectorFilter);
  if(activeSignalFilter) filtered = filtered.filter(s=>s.sig===activeSignalFilter);
  if(filtered.length===0){
    grid.innerHTML = `<div class="no-results">No stocks match current filters. <br><small>Try clearing sector or signal filter.</small></div>`;
  } else {
    grid.innerHTML = filtered.map(stockCardHTML).join('');
  }
  document.getElementById('totalSig').textContent = filtered.length;
  document.getElementById('buySig').textContent  = filtered.filter(s=>s.sig==='BUY').length;
  document.getElementById('sellSig').textContent = filtered.filter(s=>s.sig==='SELL').length;
  document.getElementById('holdSig').textContent = filtered.filter(s=>s.sig==='HOLD').length;
}

function renderSwingGrid(){
  document.getElementById('swingGrid').innerHTML = swingData.map(stockCardHTML).join('');
}

function renderLongtermGrid(){
  document.getElementById('longtermGrid').innerHTML = longtermData.map(stockCardHTML).join('');
}

// ── SECTOR FILTER (FIXED) ──────────────────────────────────────────────────
function buildSectorDropdown(){
  const dd = document.getElementById('sectorDropdown');
  const allSectors = ['', ...ALL_SECTORS];
  const labels = ['ALL SECTORS', ...ALL_SECTORS];
  dd.innerHTML = allSectors.map((s,i) => `
    <div class="sector-option ${s===activeSectorFilter?'selected':''}" onclick="selectSector('${s}','${labels[i]}')">
      ${labels[i]}
      ${s===activeSectorFilter ? '<span class="sector-check">✓</span>' : ''}
    </div>
  `).join('');
}

function toggleSectorDropdown(){
  const dd = document.getElementById('sectorDropdown');
  dd.classList.toggle('open');
  if(dd.classList.contains('open')) buildSectorDropdown();
}

function selectSector(val, label){
  activeSectorFilter = val;
  document.getElementById('sectorLabel').textContent = label;
  const btn = document.getElementById('sectorBtn');
  btn.classList.toggle('active-filter', val!=='');
  document.getElementById('sectorDropdown').classList.remove('open');
  renderStockGrid(); // ← THIS IS THE FIX: immediately re-render
}

// close dropdown on outside click
document.addEventListener('click', function(e){
  const wrap = document.querySelector('.sector-filter-wrap');
  if(wrap && !wrap.contains(e.target)){
    document.getElementById('sectorDropdown').classList.remove('open');
  }
});

// ── SIGNAL FILTER ──────────────────────────────────────────────────────────
function toggleSignalFilter(sig){
  activeSignalFilter = activeSignalFilter===sig ? '' : sig;
  document.getElementById('btnBuy').classList.toggle('active-filter', activeSignalFilter==='BUY');
  document.getElementById('btnSell').classList.toggle('active-filter', activeSignalFilter==='SELL');
  renderStockGrid();
}

// ── SEARCH (all 200+ stocks) ───────────────────────────────────────────────
const searchBox = document.getElementById('searchBox');
const searchResults = document.getElementById('searchResults');
let searchTimeout;

searchBox.addEventListener('input', function(){
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(()=>doSearch(this.value.trim()), 150);
});

searchBox.addEventListener('blur', function(){
  setTimeout(()=>searchResults.classList.remove('open'), 200);
});

searchBox.addEventListener('focus', function(){
  if(this.value.trim().length >= 1) doSearch(this.value.trim());
});

function doSearch(query){
  if(!query || query.length < 1){
    searchResults.classList.remove('open');
    return;
  }
  const q = query.toUpperCase();
  const matches = ALL_STOCKS.filter(s =>
    s.sym.includes(q) ||
    s.name.toUpperCase().includes(q) ||
    s.sector.toUpperCase().includes(q)
  ).slice(0,12);

  if(matches.length === 0){
    searchResults.innerHTML = `<div class="search-no-result">No results for "${query}"</div>`;
    searchResults.classList.add('open');
    return;
  }

  searchResults.innerHTML = matches.map(s=>{
    // get or generate price for this stock
    const existing = [...stockData,...swingData,...longtermData].find(d=>d.sym===s.sym);
    const price = existing ? existing.price : rnd(50,5000);
    const sig = existing ? existing.sig : pick(['BUY','BUY','HOLD','SELL']);
    const sigCls = sig==='BUY'?'sr-buy':sig==='SELL'?'sr-sell':'sr-hold';
    return `<div class="search-result-item" onmousedown="searchSelect('${s.sym}','${s.name}','${s.sector}',${price},'${sig}')">
      <div class="sr-left">
        <div class="sr-sym">${s.sym}</div>
        <div class="sr-name">${s.name} · ${s.sector}</div>
      </div>
      <div class="sr-right">
        <div class="sr-price">₹${price.toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2})}</div>
        <div class="sr-sig ${sigCls}">${sig}</div>
      </div>
    </div>`;
  }).join('');
  searchResults.classList.add('open');
}

function searchSelect(sym, name, sector, price, sig){
  searchResults.classList.remove('open');
  searchBox.value = '';
  const rsi = sig==='BUY'?rndInt(55,72):sig==='SELL'?rndInt(25,42):rndInt(43,58);
  openAIModal(sym, name, sector, price, rnd(-3,3), rsi, sig);
}

// ── MODAL ──────────────────────────────────────────────────────────────────
function openStockModal(el){
  const sym = el.dataset.sym;
  const stock = [...stockData,...swingData,...longtermData].find(s=>s.sym===sym);
  if(!stock) return;
  openAIModal(stock.sym, stock.name, stock.sector, stock.price, stock.chg, stock.rsi, stock.sig);
}

function openIndexModal(name){
  const idx = indexData.find(i=>i.name===name);
  if(!idx) return;
  openAIModal(idx.name, idx.name+' Index', 'Market Index', idx.price, idx.chg, idx.rsi, idx.sig);
}

async function openAIModal(sym, name, sector, price, chg, rsi, sig){
  const overlay = document.getElementById('aiModalOverlay');
  overlay.classList.add('open');
  document.getElementById('modalSym').textContent = sym;
  document.getElementById('modalName').textContent = name + ' · ' + sector;
  document.getElementById('modalPrice').textContent = '₹'+price.toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2});
  const cc = chg>=0?'up':'dn';
  document.getElementById('modalChg').textContent = (chg>=0?'+':'')+chg+'%';
  document.getElementById('modalChg').className = 'ai-modal-chg price-chg '+cc;
  const vc = sig==='BUY'?'verdict-buy':sig==='SELL'?'verdict-sell':'verdict-hold';
  document.getElementById('modalVerdictBadge').innerHTML = `<div class="ai-verdict-badge ${vc}">${sig==='BUY'?'↑':'↓'} ${sig}</div>`;
  document.getElementById('aiModalBody').innerHTML = `<div class="ai-loading"><div class="ai-loading-orb"></div><div class="ai-loading-text">ANALYZING ${sym}...</div></div>`;

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system:`You are an expert Indian stock market analyst. Provide a comprehensive analysis in JSON only. No markdown fences.
Output EXACTLY this JSON structure:
{
  "overallScore": <number 0-100>,
  "technicalScore": <number 0-100>,
  "fundamentalScore": <number 0-100>,
  "riskScore": <number 0-100>,
  "summary": "<2-3 sentence analysis>",
  "pros": ["<pro1>","<pro2>","<pro3>"],
  "cons": ["<con1>","<con2>","<con3>"],
  "target1w": <price>,
  "target1m": <price>,
  "target3m": <price>,
  "investAdvice": "<1 clear sentence on whether to invest now>",
  "keyRisk": "<1 sentence on key risk>"
}`,
        messages:[{role:'user',content:`Analyze this Indian stock:
Symbol: ${sym}
Name: ${name}
Sector: ${sector}
Current Price: ₹${price}
Change: ${chg}%
RSI: ${rsi}
Signal: ${sig}

Give analysis for NSE/BSE Indian market context.`}]
      })
    });
    const data = await resp.json();
    let text = (data.content||[]).map(b=>b.text||'').join('');
    text = text.replace(/```json|```/g,'').trim();
    const analysis = JSON.parse(text);
    renderModalContent(analysis, price, sig);
  } catch(e){
    renderModalError(sym, price, chg, rsi, sig);
  }
}

  document.getElementById('aiModalBody').innerHTML = `

      <div class="ai-score-card"><div class="ai-score-label">TECHNICAL</div><div class="ai-score-val" style="color:${scoreColor(a.technicalScore)}">${a.technicalScore}</div></div>
      <div class="ai-score-card"><div class="ai-score-label">FUNDAMENTAL</div><div class="ai-score-val" style="color:${scoreColor(a.fundamentalScore)}">${a.fundamentalScore}</div></div>
      <div class="ai-score-card"><div class="ai-score-label">RISK</div><div class="ai-score-val" style="color:${scoreColor(100-a.riskScore)}">${a.riskScore}</div></div>

      <div class="ai-section-title">💡 INVEST ADVICE</div>
      <div class="ai-text" style="color:${sig==='BUY'?'var(--buy)':sig==='SELL'?'var(--sell)':'var(--hold)'}">${a.investAdvice}</div>
    </div>
    <div class="ai-section">
      <div class="ai-section-title">⚖️ PROS & CONS</div>
      <div class="ai-pros-cons">
        <div class="ai-pros"><div class="ai-pc-title">BULLISH FACTORS</div>${a.pros.map(p=>`<div class="ai-pc-item"><div class="ai-pc-dot"></div>${p}</div>`).join('')}</div>
        <div class="ai-cons"><div class="ai-pc-title">BEARISH FACTORS</div>${a.cons.map(c=>`<div class="ai-pc-item"><div class="ai-pc-dot"></div>${c}</div>`).join('')}</div>
      </div>
    </div>
    <div class="ai-section">
      <div class="ai-section-title">🎯 PRICE TARGETS</div>
      <div class="ai-target-row">
        <div class="ai-target-card"><div class="ai-target-label">1 WEEK</div><div class="ai-target-val" style="color:var(--accent2)">₹${(+a.target1w).toLocaleString('en-IN',{maximumFractionDigits:2})}</div></div>
        <div class="ai-target-card"><div class="ai-target-label">1 MONTH</div><div class="ai-target-val" style="color:var(--accent2)">₹${(+a.target1m).toLocaleString('en-IN',{maximumFractionDigits:2})}</div></div>
        <div class="ai-target-card"><div class="ai-target-label">3 MONTHS</div><div class="ai-target-val" style="color:var(--accent2)">₹${(+a.target3m).toLocaleString('en-IN',{maximumFractionDigits:2})}</div></div>
      </div>
    </div>
    <div class="ai-section">
      <div class="ai-section-title">⚠️ KEY RISK</div>
      <div class="ai-text" style="color:var(--sell)">${a.keyRisk}</div>
    </div>`;
}

function renderModalError(sym, price, chg, rsi, sig){
  // Fallback with static analysis if API fails
  const invest = calcInvestAdvice(rsi, chg>=0?'up':'dn', 22);
  document.getElementById('aiModalBody').innerHTML = `
    <div class="ai-score-row">
      <div class="ai-score-card"><div class="ai-score-label">RSI</div><div class="ai-score-val" style="color:${rsi>60?'var(--buy)':rsi<40?'var(--sell)':'var(--hold)'}">${rsi}</div></div>
      <div class="ai-score-card"><div class="ai-score-label">SIGNAL</div><div class="ai-score-val" style="color:${sig==='BUY'?'var(--buy)':sig==='SELL'?'var(--sell)':'var(--hold)'}">${sig}</div></div>
      <div class="ai-score-card"><div class="ai-score-label">CHANGE</div><div class="ai-score-val" style="color:${chg>=0?'var(--buy)':'var(--sell)'}">${chg>0?'+':''}${chg}%</div></div>

      <div class="ai-text" style="color:var(--accent2);font-size:16px">${invest.label}</div>

function closeModal(){
  document.getElementById('aiModalOverlay').classList.remove('open');
}
document.getElementById('aiModalOverlay').addEventListener('click', function(e){
  if(e.target===this) closeModal();
});

// ── TABS ──────────────────────────────────────────────────────────────────
function switchTab(tab, btn){
  document.querySelectorAll('.dashboard').forEach(d=>d.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('dash-'+tab).classList.add('active');
  btn.classList.add('active');
}

// ── TICKER ────────────────────────────────────────────────────────────────
function updateTicker(){
  const items = ALL_STOCKS.slice(0,20).map(s=>{
    const chg = rnd(-3,3);
    const sign = chg>=0?'+':'';
    const cls = chg>=0?'up':'dn';
    return `<div class="tick-item"><span class="tick-name">${s.sym}</span><span class="tick-val">₹${rnd(100,3000).toFixed(1)}</span><span class="tick-chg ${cls}">${sign}${chg}%</span></div>`;
  }).join('');
  document.getElementById('ticker').innerHTML = items;
}

// ── CLOCK ────────────────────────────────────────────────────────────────
function updateClock(){
  const now = new Date();
  const h=String(now.getHours()).padStart(2,'0');
  const m=String(now.getMinutes()).padStart(2,'0');
  const s=String(now.getSeconds()).padStart(2,'0');
  document.getElementById('timeBadge').textContent = `${h}:${m}:${s}`;
}

// ── COUNTDOWN ────────────────────────────────────────────────────────────
let countdown = 15;
const CIRC = 75.4;
function resetCountdown(){countdown=15;}
setInterval(()=>{
  countdown--;
  if(countdown<=0){refreshAll();countdown=15;}
  document.getElementById('countdownNum').textContent = countdown+'s';
  const ring = document.getElementById('ringFg');
  const offset = CIRC*(1-countdown/15);
  ring.style.strokeDashoffset = offset;
  ring.style.stroke = countdown<=5?'var(--sell)':countdown<=10?'var(--hold)':'var(--accent)';
},1000);

// ── REFRESH ────────────────────────────────────────────────────────────────
function refreshAll(){
  indexData  = generateIndexData();
  stockData  = generateStockData(30);
  swingData  = generateStockData(20);
  longtermData = generateStockData(15);
  renderIndices();
  renderStockGrid();
  renderSwingGrid();
  renderLongtermGrid();
  updateTicker();
}

// ── INIT ──────────────────────────────────────────────────────────────────
refreshAll();
setInterval(updateClock, 1000);
setInterval(updateTicker, 8000);
updateClock();
</script>
